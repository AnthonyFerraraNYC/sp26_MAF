<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKNY — SP26 Lookbook</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gap: 3px;
    --bg: #0a0a0a;
    --fg: #e8e0d4;
    --accent: #c9a96e;
    --header-h: 64px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  /* ── Cursor ── */
  .cur-dot {
    position: fixed;
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2147483647; /* max possible z-index */
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 1.5px #000, 0 0 5px rgba(0,0,0,0.6);
    will-change: transform;
  }
  .cur-ring {
    position: fixed;
    pointer-events: none;
    z-index: 2147483646;
    will-change: transform;
    /* Larger than the ellipse to give shadow room — no corner artifacts */
    width: 80px; height: 80px;
    overflow: visible;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    position: relative;
    z-index: 10;
  }
  .logo {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.45em;
    color: var(--fg);
  }
  .season {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(232,224,212,0.4);
  }

  /* ── Grid ── */
  .grid-wrap {
    width: 100%;
    height: calc(100vh - var(--header-h));
    padding: var(--gap);
  }
  .grid {
    display: grid;
    gap: var(--gap);
    width: 100%;
    height: 100%;
    transition:
      grid-template-columns 0.55s cubic-bezier(0.22, 1, 0.36, 1),
      grid-template-rows    0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ── Cell ── */
  .cell {
    position: relative;
    overflow: hidden;
    background: #141414;
    cursor: none;
  }
  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    pointer-events: none;
  }

  /* Dim overlay */
  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 1;
    pointer-events: none;
  }
  .grid.has-hover .cell:not(.active)::before { opacity: 0.62; }

  /* Bottom vignette */
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    z-index: 1;
  }
  .grid.has-hover .cell.active::after { opacity: 1; }

  /* Badge */
  .badge {
    position: absolute;
    bottom: 14px; left: 16px;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .badge-sub {
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
  }
  .badge-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    font-style: italic;
    color: var(--fg);
    line-height: 1;
    margin-top: 1px;
  }
  .badge-circle {
    position: absolute;
    bottom: 12px; right: 14px;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
    transform: scale(0.65);
    transition: opacity 0.4s ease 0.06s, transform 0.5s cubic-bezier(0.22,1,0.36,1) 0.06s;
    pointer-events: none;
    z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  .badge-circle::after {
    content: ''; width: 5px; height: 5px;
    border-radius: 50%; background: var(--accent);
  }

  .grid.has-hover .cell.active .badge        { opacity: 1; transform: translateY(0); }
  .grid.has-hover .cell.active .badge-circle { opacity: 1; transform: scale(1); }
  .grid.has-hover .cell.active               { z-index: 2; }

  /* ── Lightbox ── */
  #lightbox {
    position: fixed; inset: 0; z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    background: rgba(0,0,0,0);
    transition: opacity 0.5s ease, background 0.5s ease;
  }
  #lightbox.open { opacity: 1; pointer-events: all; background: rgba(0,0,0,0.92); }
  #lightbox-img {
    max-width: 90vw; max-height: 92vh; object-fit: contain;
    transform: scale(0.92); opacity: 0;
    transition: transform 0.55s cubic-bezier(0.22,1,0.36,1), opacity 0.45s ease;
  }
  #lightbox.open #lightbox-img { transform: scale(1); opacity: 1; }

  #lightbox-close {
    position: fixed; top: 28px; right: 36px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    z-index: 9100; cursor: none; opacity: 0;
    transition: opacity 0.4s ease 0.2s;
  }
  #lightbox.open #lightbox-close { opacity: 1; }
  #lightbox-close::before, #lightbox-close::after {
    content: ''; position: absolute; width: 20px; height: 1px; background: var(--fg);
  }
  #lightbox-close::before { transform: rotate(45deg); }
  #lightbox-close::after  { transform: rotate(-45deg); }

  .lb-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    cursor: none; z-index: 9100; opacity: 0;
    background: none; border: none;
    transition: opacity 0.4s ease 0.2s;
  }
  #lightbox.open .lb-arrow { opacity: 1; }
  #lb-prev { left: 28px; } #lb-next { right: 28px; }
  .lb-arrow svg { width: 24px; height: 24px; stroke: var(--fg); stroke-width: 1; fill: none; }

  #lightbox-label {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(232,224,212,0.4); opacity: 0; white-space: nowrap;
    transition: opacity 0.4s ease 0.25s; z-index: 9100;
  }
  #lightbox.open #lightbox-label { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">D K N Y</div>
  <div class="season">Spring 26 &mdash; Lookbook</div>
</header>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div id="lightbox">
  <div id="lightbox-close"></div>
  <button class="lb-arrow" id="lb-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <img id="lightbox-img" src="" alt="">
  <button class="lb-arrow" id="lb-next"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
  <div id="lightbox-label"></div>
</div>

<script>
  const images = [
    "DKNY_SP26_LOOKBOOK_01.jpg",
    "DKNY_SP26_LOOKBOOK_02.jpg",
    "DKNY_SP26_LOOKBOOK_03.jpg",
    "DKNY_SP26_LOOKBOOK_17.jpg",
    "DKNY_SP26_LOOKBOOK_19.jpg",
    "DKNY_SP26_LOOKBOOK_25.jpg",
    "DKNY_SP26_LOOKBOOK_26.jpg",
    "DKNY_SP26_LOOKBOOK_27.jpg",
    "DKNY_SP26_LOOKBOOK_31.jpg",
    "DKNY_SP26_LOOKBOOK_35.jpg",
    "DKNY_SP26_LOOKBOOK_36.jpg",
    "DKNY_SP26_LOOKBOOK_39.jpg",
  ];

  const COLS=3, ROWS=Math.ceil(images.length/3), TOTAL=ROWS*3;
  const EXPAND_COL=2.6, EXPAND_ROW=3.2, FALLOFF=1.4;

  const grid        = document.getElementById('grid');
  const defaultCols = Array(COLS).fill('1fr').join(' ');
  const defaultRows = Array(ROWS).fill('1fr').join(' ');
  grid.style.gridTemplateColumns = defaultCols;
  grid.style.gridTemplateRows    = defaultRows;

  for (let i = 0; i < TOTAL; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.dataset.index = i;
    if (images[i]) {
      const img = document.createElement('img');
      img.src = images[i]; img.alt = `Look ${i+1}`;
      img.loading = i < COLS ? 'eager' : 'lazy';
      cell.appendChild(img);
    }
    const badge = document.createElement('div');
    badge.className = 'badge';
    badge.innerHTML = `<div class="badge-sub">DKNY &middot; SP26</div><div class="badge-num">${String(i+1).padStart(2,'0')}</div>`;
    cell.appendChild(badge);
    const ring = document.createElement('div');
    ring.className = 'badge-circle';
    cell.appendChild(ring);
    grid.appendChild(cell);
  }

  function trackSizes(n, idx, expand, falloff) {
    const raw = Array.from({length:n},(_,i)=>1+(expand-1)*Math.exp(-Math.pow(Math.abs(i-idx),2)*falloff));
    const sum = raw.reduce((a,b)=>a+b,0);
    return raw.map(v=>(v/sum)*n);
  }

  const cells = [...grid.querySelectorAll('.cell')];
  let lightboxOpen = false;

  cells.forEach((cell, i) => {
    const col = i % COLS, row = Math.floor(i / COLS);
    cell.addEventListener('mouseenter', () => {
      if (lightboxOpen) return;
      grid.classList.add('has-hover');
      cells.forEach(c => c.classList.remove('active'));
      cell.classList.add('active');
      grid.style.gridTemplateColumns = trackSizes(COLS,col,EXPAND_COL,FALLOFF).map(v=>`${v}fr`).join(' ');
      grid.style.gridTemplateRows    = trackSizes(ROWS,row,EXPAND_ROW,FALLOFF).map(v=>`${v}fr`).join(' ');
    });
    cell.addEventListener('click', () => { if (images[i]) openLightbox(i); });
  });

  grid.addEventListener('mouseleave', () => {
    if (lightboxOpen) return;
    grid.classList.remove('has-hover');
    cells.forEach(c => c.classList.remove('active'));
    grid.style.gridTemplateColumns = defaultCols;
    grid.style.gridTemplateRows    = defaultRows;
  });

  const lightbox      = document.getElementById('lightbox');
  const lightboxImg   = document.getElementById('lightbox-img');
  const lightboxLabel = document.getElementById('lightbox-label');
  const lbImages      = images.filter(Boolean);
  let currentIndex    = 0;

  function openLightbox(idx) {
    currentIndex = idx; showImage(idx);
    lightbox.classList.add('open'); lightboxOpen = true;
    grid.classList.remove('has-hover'); cells.forEach(c=>c.classList.remove('active'));
    grid.style.gridTemplateColumns = defaultCols;
    grid.style.gridTemplateRows    = defaultRows;
  }
  function closeLightbox() { lightbox.classList.remove('open'); lightboxOpen = false; }
  function showImage(idx) {
    lightboxImg.style.opacity='0'; lightboxImg.style.transform='scale(0.96)';
    setTimeout(()=>{ lightboxImg.src=lbImages[idx]; lightboxImg.style.opacity='1'; lightboxImg.style.transform='scale(1)'; },180);
    lightboxLabel.textContent=`DKNY · SP26 · Look ${String(idx+1).padStart(2,'0')} of ${String(lbImages.length).padStart(2,'0')}`;
  }
  function prevImage(){ currentIndex=(currentIndex-1+lbImages.length)%lbImages.length; showImage(currentIndex); }
  function nextImage(){ currentIndex=(currentIndex+1)%lbImages.length; showImage(currentIndex); }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', prevImage);
  document.getElementById('lb-next').addEventListener('click', nextImage);
  lightbox.addEventListener('click', e=>{ if(e.target===lightbox) closeLightbox(); });
  document.addEventListener('keydown', e=>{
    if(!lightboxOpen) return;
    if(e.key==='Escape') closeLightbox();
    if(e.key==='ArrowLeft') prevImage();
    if(e.key==='ArrowRight') nextImage();
  });

  // ── Cursor — built and appended via JS to guarantee last in DOM ────────────
  // Last element in body = always renders on top, no z-index battles possible.
  const dot = document.createElement('div');
  dot.className = 'cur-dot';
  dot.style.cssText = 'left:-100px;top:-100px;';

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg   = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 80 80');
  svg.setAttribute('width',  '80');
  svg.setAttribute('height', '80');
  svg.className = 'cur-ring';
  svg.style.cssText = 'left:-100px;top:-100px;';

  const ellipse = document.createElementNS(svgNS, 'ellipse');
  ellipse.setAttribute('cx', '40');
  ellipse.setAttribute('cy', '40');
  ellipse.setAttribute('rx', '22');
  ellipse.setAttribute('ry', '22');
  ellipse.setAttribute('fill', 'none');
  ellipse.setAttribute('stroke', '#ffffff');
  ellipse.setAttribute('stroke-width', '1.5');
  ellipse.style.transformOrigin = '40px 40px';
  // Shadow via SVG filter — defined inside SVG so it clips correctly
  svg.innerHTML = `
    <defs>
      <filter id="cshadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#000" flood-opacity="0.9"/>
      </filter>
    </defs>`;
  ellipse.setAttribute('filter', 'url(#cshadow)');
  svg.appendChild(ellipse);

  document.body.appendChild(svg);
  document.body.appendChild(dot);

  const SPRING=0.12, DAMPING=0.78, BASE_R=22, MAX_SQUASH=0.45;
  let mx=window.innerWidth/2, my=window.innerHeight/2;
  let rx=mx, ry=my, vx=0, vy=0, isHovering=false;

  cells.forEach(cell=>{
    cell.addEventListener('mouseenter',()=>isHovering=true);
    cell.addEventListener('mouseleave',()=>isHovering=false);
  });

  document.addEventListener('mousemove', e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left = mx+'px';
    dot.style.top  = my+'px';
  });

  function lerp(a,b,t){ return a+(b-a)*t; }

  (function animate(){
    vx=(vx+(mx-rx)*SPRING)*DAMPING;
    vy=(vy+(my-ry)*SPRING)*DAMPING;
    rx+=vx; ry+=vy;

    const speed   = Math.sqrt(vx*vx+vy*vy);
    const angle   = Math.atan2(vy,vx);
    const stretch = Math.min(speed*0.045, MAX_SQUASH);

    const targetRx = isHovering ? BASE_R*1.9 : BASE_R*(1+stretch);
    const targetRy = isHovering ? BASE_R*1.9 : BASE_R*Math.max(0.55,1-stretch*0.7);

    const newRx = lerp(parseFloat(ellipse.getAttribute('rx'))||BASE_R, targetRx, 0.18);
    const newRy = lerp(parseFloat(ellipse.getAttribute('ry'))||BASE_R, targetRy, 0.18);

    ellipse.setAttribute('rx', newRx);
    ellipse.setAttribute('ry', newRy);
    ellipse.style.transform = `rotate(${angle*(180/Math.PI)}deg)`;
    ellipse.style.opacity   = isHovering ? '0.85' : '1';

    // Centre the 80×80 SVG on the ring position
    svg.style.left = (rx-40)+'px';
    svg.style.top  = (ry-40)+'px';

    requestAnimationFrame(animate);
  })();
</script>
</body>
</html>
